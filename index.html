<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>旅記 - 智慧旅遊記帳 PWA</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
              900: '#312e81',
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts & FontAwesome Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & Babel CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <!-- PWA Manifest via Data URI -->
  <link id="manifest-link" rel="manifest">

  <style>
    body {
      font-family: 'Plus Jakarta Sans', 'Noto Sans TC', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    /* Smooth transition for active tabs */
    .nav-indicator {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Hide scrollbars */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* IOS Safe Area Padding */
    .pb-safe {
      padding-bottom: calc(env(safe-area-inset-bottom) + 4rem);
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col overflow-x-hidden">

  <div id="root" class="w-full max-w-md mx-auto bg-slate-950 min-h-screen flex flex-col relative shadow-2xl"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- PWA Setup ---
    const manifestData = {
      name: "旅記 - 智慧旅遊記帳",
      short_name: "旅記",
      description: "海外旅遊智慧記帳，內建 AI 相機發票辨識與日幣台幣即時換算。",
      start_url: ".",
      display: "standalone",
      background_color: "#030712",
      theme_color: "#4f46e5",
      icons: [
        {
          src: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f46e5'/><path d='M35 35h30v30H35z' fill='none' stroke='white' stroke-width='6'/><circle cx='50' cy='50' r='8' fill='%23f59e0b'/><path d='M30 30 L45 20 L55 20 L70 30' fill='none' stroke='white' stroke-width='4'/></svg>",
          sizes: "512x512",
          type: "image/svg+xml",
          purpose: "any maskable"
        }
      ]
    };

    const manifestBlob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(manifestBlob);
    document.getElementById('manifest-link').setAttribute('href', manifestURL);

    // Inline Service Worker setup for off-line shell
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE_NAME = 'travel-tracker-v1';
        const ASSETS = [
          '/',
          window.location.href
        ];
        self.addEventListener('install', (e) => {
          e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)));
        });
        self.addEventListener('fetch', (e) => {
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
        });
      `;
      const swBlob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(swBlob);
      navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration skipped in sandbox', err));
    }

    // --- Main React App ---
    function App() {
      // States
      const [activeTab, setActiveTab] = useState('add'); // 'add', 'list', 'stats', 'settings'
      const [records, setRecords] = useState([]);
      const [rate, setRate] = useState(0.215); // Default JPY -> TWD rate
      const [apiKey, setApiKey] = useState(''); // Gemini API Key
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isInstalled, setIsInstalled] = useState(false);

      // Camera & Scanner State
      const [showCamera, setShowCamera] = useState(false);
      const [cameraLoading, setCameraLoading] = useState(false);
      const [scanStatus, setScanStatus] = useState('');
      const videoRef = useRef(null);
      const canvasRef = useRef(null);

      // Form State
      const [formData, setFormData] = useState({
        time: '',
        item: '',
        amount: '',
        currency: 'JPY',
        category: '餐飲'
      });

      // Categories with colors and icons
      const categories = [
        { name: '餐飲', icon: 'fa-utensils', color: 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30' },
        { name: '交通', icon: 'fa-train', color: 'bg-blue-500/20 text-blue-400 border-blue-500/30' },
        { name: '購物', icon: 'fa-bag-shopping', color: 'bg-pink-500/20 text-pink-400 border-pink-500/30' },
        { name: '住宿', icon: 'fa-hotel', color: 'bg-purple-500/20 text-purple-400 border-purple-500/30' },
        { name: '門票', icon: 'fa-ticket', color: 'bg-amber-500/20 text-amber-400 border-amber-500/30' },
        { name: '其他', icon: 'fa-ellipsis-h', color: 'bg-slate-500/20 text-slate-400 border-slate-500/30' },
      ];

      // Init and local storage load
      useEffect(() => {
        const storedRecords = localStorage.getItem('travel_records');
        if (storedRecords) setRecords(JSON.parse(storedRecords));

        const storedRate = localStorage.getItem('travel_rate');
        if (storedRate) setRate(parseFloat(storedRate));

        const storedKey = localStorage.getItem('gemini_api_key');
        if (storedKey) setApiKey(storedKey);

        // Current time default
        resetFormTime();

        // PWA Install prompt listener
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
        });

        // Check if already installed as PWA
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
          setIsInstalled(true);
        }
      }, []);

      const saveRecords = (newRecords) => {
        setRecords(newRecords);
        localStorage.setItem('travel_records', JSON.stringify(newRecords));
      };

      const resetFormTime = () => {
        const now = new Date();
        const offset = now.getTimezoneOffset();
        const localNow = new Date(now.getTime() - (offset*60*1000));
        const formatted = localNow.toISOString().slice(0, 16);
        setFormData(prev => ({ ...prev, time: formatted }));
      };

      // Handle PWA installation
      const handleInstallClick = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          setDeferredPrompt(null);
          setIsInstalled(true);
        }
      };

      // Add record manually or from scanner
      const handleAddRecord = (e) => {
        if (e) e.preventDefault();
        if (!formData.item || !formData.amount) {
          showNotification('請填寫完整項目名稱與金額！', 'warning');
          return;
        }

        const newRecord = {
          id: Date.now().toString(),
          time: formData.time,
          item: formData.item,
          amount: parseFloat(formData.amount),
          currency: formData.currency,
          category: formData.category
        };

        const updated = [newRecord, ...records];
        saveRecords(updated);
        showNotification('成功新增一筆消費！', 'success');

        // Reset
        setFormData({
          time: '',
          item: '',
          amount: '',
          currency: 'JPY',
          category: '餐飲'
        });
        resetFormTime();
      };

      const handleDeleteRecord = (id) => {
        const updated = records.filter(r => r.id !== id);
        saveRecords(updated);
        showNotification('已刪除該筆記錄', 'info');
      };

      // Toast Notification System
      const [notification, setNotification] = useState(null);
      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      // --- CAMERA SCAN & AI RECOGNITION (Gemini API) ---
      const startCamera = async () => {
        setShowCamera(true);
        setCameraLoading(true);
        setScanStatus('正在啟動相機...');
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
          });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.onloadedmetadata = () => {
              videoRef.current.play();
              setCameraLoading(false);
              setScanStatus('相機就緒，對準發票/收據/商品');
            };
          }
        } catch (err) {
          console.error("Camera access failed", err);
          showNotification("無法存取相機，請檢查瀏覽器權限", "error");
          setShowCamera(false);
          setCameraLoading(false);
        }
      };

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          const tracks = videoRef.current.srcObject.getTracks();
          tracks.forEach(track => track.stop());
        }
        setShowCamera(false);
      };

      const captureAndRecognize = async () => {
        if (!videoRef.current || !canvasRef.current) return;
        setCameraLoading(true);
        setScanStatus('正在拍攝照片並壓縮...');

        const video = videoRef.current;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        // Set dimensions to match actual video feed
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Downscale image to a reasonable size for Gemini API to process fast
        const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        
        stopCamera();
        setScanStatus('AI 正在光學辨識發票中，請稍候...');
        setCameraLoading(true);

        try {
          // Gemini API Call with Exponential Backoff
          const prompt = `你是一個專業的日本與台灣旅遊記帳助手。請仔細辨識發票/收據照片，並提取以下資訊：
          1. 交易時間 (格式必須為: YYYY-MM-DD HH:mm，如果發票沒有年份，使用今年2026年)
          2. 消費項目/商品名稱 (請盡量翻譯或轉化為易懂的繁體中文，例如 冰淇淋, 拉麵, 藥妝等)
          3. 最終消費總金額 (純數字)
          4. 幣別 (必須是 'JPY' 或 'TWD')
          5. 最符合的消費分類，請限制在以下幾種之一：'餐飲', '交通', '購物', '住宿', '門票', '其他'。

          請只返回一個合法的 JSON 對象，不要包含 markdown 標籤，例如：
          {
            "time": "2026-06-19 14:30",
            "item": "一蘭拉麵",
            "amount": 980,
            "currency": "JPY",
            "category": "餐飲"
          }`;

          let responseText = '';
          let success = false;
          let retries = 5;
          let delay = 1000;

          // Call wrapper as specified
          const targetKey = apiKey || ""; // empty string fallback logic as mandated
          const apiURL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${targetKey}`;

          for (let attempt = 1; attempt <= retries; attempt++) {
            try {
              const res = await fetch(apiURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [
                    {
                      parts: [
                        { text: prompt },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                      ]
                    }
                  ],
                  generationConfig: {
                    responseMimeType: "application/json"
                  }
                })
              });

              if (res.ok) {
                const result = await res.json();
                responseText = result.candidates?.[0]?.content?.parts?.[0]?.text;
                success = true;
                break;
              } else {
                throw new Error(`API returned status ${res.status}`);
              }
            } catch (err) {
              if (attempt === retries) throw err;
              await new Promise(r => setTimeout(r, delay));
              delay *= 2; // exponential backoff
            }
          }

          if (success && responseText) {
            // Clean response text just in case Gemini returned markdown json blocks
            const cleanJson = responseText.replace(/```json/g, '').replace(/```/g, '').trim();
            const aiData = JSON.parse(cleanJson);
            
            setFormData({
              time: aiData.time || formData.time,
              item: aiData.item || '掃描所得項目',
              amount: aiData.amount ? aiData.amount.toString() : '',
              currency: aiData.currency === 'TWD' ? 'TWD' : 'JPY',
              category: aiData.category || '其他'
            });

            showNotification('AI 辨識成功！請核對後按下新增。', 'success');
          } else {
            throw new Error('未取得有效辨識結果');
          }

        } catch (err) {
          console.error(err);
          showNotification('辨識失敗：' + (apiKey ? '請確保照片清晰且是發票收據。' : '未設定有效 API 金鑰，請至設定分頁填寫。'), 'error');
        } finally {
          setCameraLoading(false);
          setScanStatus('');
        }
      };

      // --- STATS CALCULATIONS ---
      const totalInJPY = records.reduce((sum, r) => {
        if (r.currency === 'JPY') return sum + r.amount;
        return sum + (r.amount / rate); // TWD -> JPY
      }, 0);

      const totalInTWD = totalInJPY * rate;

      // Category breakdown
      const categoryTotals = categories.reduce((acc, cat) => {
        const catRecords = records.filter(r => r.category === cat.name);
        const totalJPY = catRecords.reduce((sum, r) => {
          if (r.currency === 'JPY') return sum + r.amount;
          return sum + (r.amount / rate);
        }, 0);
        acc[cat.name] = {
          jpy: totalJPY,
          twd: totalJPY * rate,
          percentage: totalInJPY > 0 ? (totalJPY / totalInJPY) * 100 : 0
        };
        return acc;
      }, {});

      // Daily Breakdown
      const dailyRecords = records.reduce((acc, r) => {
        const date = r.time.slice(0, 10); // YYYY-MM-DD
        if (!acc[date]) acc[date] = [];
        acc[date].push(r);
        return acc;
      }, {});

      return (
        <div className="flex flex-col min-h-screen pb-safe">
          {/* Header */}
          <header className="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-30 flex items-center justify-between">
            <div className="flex items-center space-x-2">
              <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/30">
                <i className="fa-solid fa-plane-departure text-white text-lg"></i>
              </div>
              <div>
                <h1 className="text-lg font-bold tracking-tight bg-gradient-to-r from-brand-400 to-amber-400 bg-clip-text text-transparent">旅記</h1>
                <p className="text-xs text-slate-400">日本/海外旅遊記帳</p>
              </div>
            </div>

            <div className="flex items-center space-x-2">
              {/* PWA Install Button */}
              {deferredPrompt && !isInstalled && (
                <button 
                  onClick={handleInstallClick}
                  className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs px-3 py-1.5 rounded-lg flex items-center space-x-1 transition-all shadow-md animate-bounce"
                >
                  <i className="fa-solid fa-circle-down"></i>
                  <span>安裝 App</span>
                </button>
              )}
              {isInstalled && (
                <span className="text-[10px] bg-slate-800 text-slate-400 border border-slate-700 px-2 py-1 rounded-full flex items-center space-x-1">
                  <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 inline-block animate-pulse"></span>
                  <span>已安裝</span>
                </span>
              )}
            </div>
          </header>

          {/* Toast Notification */}
          {notification && (
            <div className={`fixed top-18 left-1/2 -translate-x-1/2 z-50 px-4 py-2.5 rounded-xl shadow-xl flex items-center space-x-2 border transition-all text-sm w-[90%] max-w-sm ${
              notification.type === 'success' ? 'bg-emerald-950 border-emerald-500/30 text-emerald-300' :
              notification.type === 'error' ? 'bg-rose-950 border-rose-500/30 text-rose-300' :
              notification.type === 'warning' ? 'bg-amber-950 border-amber-500/30 text-amber-300' :
              'bg-slate-900 border-slate-700 text-slate-300'
            }`}>
              <i className={`fa-solid ${
                notification.type === 'success' ? 'fa-circle-check text-emerald-400' :
                notification.type === 'error' ? 'fa-circle-xmark text-rose-400' :
                notification.type === 'warning' ? 'fa-triangle-exclamation text-amber-400' :
                'fa-circle-info text-blue-400'
              }`}></i>
              <span className="font-medium">{notification.message}</span>
            </div>
          )}

          {/* Quick Realtime Summary Cards */}
          <div className="p-4 bg-gradient-to-b from-slate-900 to-slate-950/50">
            <div className="bg-gradient-to-br from-indigo-950 via-slate-900 to-slate-900 border border-brand-500/20 rounded-2xl p-4 shadow-xl relative overflow-hidden">
              <div className="absolute top-0 right-0 w-24 h-24 bg-brand-500/5 rounded-full blur-2xl pointer-events-none"></div>
              <div className="flex justify-between items-start">
                <div>
                  <p className="text-xs text-indigo-300 font-medium tracking-wider uppercase">旅遊消費總計</p>
                  <p className="text-3xl font-extrabold mt-1 text-white">
                    <span className="text-xs text-amber-400 mr-1">¥</span>
                    {totalInJPY.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}
                  </p>
                  <p className="text-sm text-slate-400 mt-0.5">
                    約 <span className="font-semibold text-emerald-400">NT$ {totalInTWD.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</span>
                  </p>
                </div>
                <div className="bg-slate-800/80 border border-slate-700/50 px-2.5 py-1.5 rounded-xl text-right">
                  <p className="text-[10px] text-slate-400">目前匯率</p>
                  <p className="text-xs font-bold text-slate-200 mt-0.5">1 JPY = {rate} TWD</p>
                </div>
              </div>
            </div>
          </div>

          {/* Camera Scan Overlay Screen */}
          {showCamera && (
            <div className="fixed inset-0 bg-black z-50 flex flex-col justify-between p-4">
              <div className="flex justify-between items-center z-10">
                <h3 className="text-base font-bold text-white"><i className="fa-solid fa-wand-magic-sparkles text-amber-400 mr-1"></i> AI 智慧發票辨識</h3>
                <button onClick={stopCamera} className="w-10 h-10 bg-slate-900/80 rounded-full flex items-center justify-center text-slate-400 hover:text-white">
                  <i className="fa-solid fa-xmark"></i>
                </button>
              </div>

              {/* Viewfinder */}
              <div className="relative w-full aspect-[3/4] bg-slate-900 rounded-2xl overflow-hidden shadow-inner flex items-center justify-center border-2 border-dashed border-slate-700">
                <video ref={videoRef} playsInline className="absolute inset-0 w-full h-full object-cover"></video>
                <canvas ref={canvasRef} className="hidden"></canvas>
                
                {/* Overlay guides */}
                <div className="absolute inset-x-8 top-12 bottom-12 border-2 border-amber-400/40 rounded-lg pointer-events-none flex flex-col justify-between p-4">
                  <div className="flex justify-between">
                    <div className="w-4 h-4 border-t-2 border-l-2 border-amber-400"></div>
                    <div className="w-4 h-4 border-t-2 border-r-2 border-amber-400"></div>
                  </div>
                  <div className="text-center bg-slate-950/80 backdrop-blur-sm py-1.5 px-3 rounded text-xs text-amber-300">
                    請使發票或物品清晰居中
                  </div>
                  <div className="flex justify-between">
                    <div className="w-4 h-4 border-b-2 border-l-2 border-amber-400"></div>
                    <div className="w-4 h-4 border-b-2 border-r-2 border-amber-400"></div>
                  </div>
                </div>

                {cameraLoading && (
                  <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center p-4">
                    <div className="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
                    <p className="mt-4 text-sm font-semibold text-slate-200 text-center">{scanStatus}</p>
                  </div>
                )}
              </div>

              {/* Trigger */}
              <div className="flex flex-col items-center space-y-3 pb-8 z-10">
                <button 
                  onClick={captureAndRecognize}
                  disabled={cameraLoading}
                  className="w-18 h-18 bg-white hover:bg-slate-100 rounded-full border-4 border-slate-300 flex items-center justify-center active:scale-95 transition-all shadow-xl disabled:opacity-50"
                >
                  <div className="w-14 h-14 bg-brand-600 rounded-full flex items-center justify-center">
                    <i className="fa-solid fa-camera text-white text-xl"></i>
                  </div>
                </button>
                <span className="text-xs text-slate-400">點擊按鈕拍照並開始 AI 辨識</span>
              </div>
            </div>
          )}

          {/* MAIN CONTENT AREA */}
          <main className="flex-1 px-4 overflow-y-auto">
            {/* TAB 1: ADD RECORD */}
            {activeTab === 'add' && (
              <div className="space-y-4">
                {/* AI Cam Shortcut Panel */}
                <div className="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex items-center justify-between">
                  <div className="flex items-center space-x-3">
                    <div className="w-10 h-10 bg-amber-500/10 border border-amber-500/20 text-amber-400 rounded-xl flex items-center justify-center">
                      <i className="fa-solid fa-wand-magic-sparkles text-base"></i>
                    </div>
                    <div>
                      <h3 className="text-sm font-bold text-slate-200">免手動輸入！AI 辨識發票</h3>
                      <p className="text-xs text-slate-400">拍照自動填入消費時間、名稱、金額</p>
                    </div>
                  </div>
                  <button 
                    onClick={startCamera}
                    className="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold text-xs px-3 py-2 rounded-xl flex items-center space-x-1 shadow-lg shadow-amber-500/10 active:scale-95 transition-all"
                  >
                    <i className="fa-solid fa-camera"></i>
                    <span>開啟相機</span>
                  </button>
                </div>

                {/* Manual Entry Form */}
                <form onSubmit={handleAddRecord} className="bg-slate-900 border border-slate-800 rounded-2xl p-4 space-y-4 shadow-xl">
                  <h3 className="text-sm font-bold text-slate-200 border-b border-slate-800 pb-2"><i className="fa-solid fa-pen-to-square mr-1 text-brand-400"></i> 新增消費項目</h3>
                  
                  {/* Category Grid Selection */}
                  <div>
                    <label className="text-xs text-slate-400 block mb-2 font-medium">消費分類</label>
                    <div className="grid grid-cols-3 gap-2">
                      {categories.map((cat) => {
                        const isSelected = formData.category === cat.name;
                        return (
                          <button
                            key={cat.name}
                            type="button"
                            onClick={() => setFormData(prev => ({ ...prev, category: cat.name }))}
                            className={`py-2 px-3 rounded-xl border text-xs font-semibold flex flex-col items-center justify-center space-y-1.5 transition-all ${
                              isSelected 
                                ? 'bg-brand-600 text-white border-brand-500 shadow-md shadow-brand-600/20 scale-[1.02]' 
                                : 'bg-slate-850 text-slate-300 border-slate-750 hover:bg-slate-800'
                            }`}
                          >
                            <i className={`fa-solid ${cat.icon} text-sm ${isSelected ? 'text-white' : 'text-slate-400'}`}></i>
                            <span>{cat.name}</span>
                          </button>
                        );
                      })}
                    </div>
                  </div>

                  {/* Date & Time Field */}
                  <div>
                    <label className="text-xs text-slate-400 block mb-1 font-medium">時間</label>
                    <div className="relative">
                      <input 
                        type="datetime-local" 
                        required
                        value={formData.time}
                        onChange={(e) => setFormData(prev => ({ ...prev, time: e.target.value }))}
                        className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-brand-500"
                      />
                    </div>
                  </div>

                  {/* Item Description */}
                  <div>
                    <label className="text-xs text-slate-400 block mb-1 font-medium">物品/項目名稱</label>
                    <input 
                      type="text" 
                      placeholder="例如：拉麵、藥妝、新幹線..."
                      required
                      value={formData.item}
                      onChange={(e) => setFormData(prev => ({ ...prev, item: e.target.value }))}
                      className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-brand-500"
                    />
                  </div>

                  {/* Currency & Amount Combined */}
                  <div>
                    <label className="text-xs text-slate-400 block mb-1 font-medium">金額</label>
                    <div className="flex rounded-xl overflow-hidden border border-slate-800">
                      <select
                        value={formData.currency}
                        onChange={(e) => setFormData(prev => ({ ...prev, currency: e.target.value }))}
                        className="bg-slate-950 text-slate-200 px-3 text-sm font-bold border-r border-slate-800 focus:outline-none"
                      >
                        <option value="JPY">日幣 ¥</option>
                        <option value="TWD">台幣 NT$</option>
                      </select>
                      <input 
                        type="number" 
                        pattern="[0-9]*"
                        inputMode="decimal"
                        placeholder="請輸入金額..."
                        required
                        value={formData.amount}
                        onChange={(e) => setFormData(prev => ({ ...prev, amount: e.target.value }))}
                        className="w-full bg-slate-950 px-3 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-brand-500"
                      />
                    </div>
                    {/* Display quick conversion below input */}
                    {formData.amount && (
                      <p className="text-[10px] text-slate-400 mt-1.5 px-1">
                        約等同於 {formData.currency === 'JPY' ? (
                          <span>NT$ <span className="text-emerald-400 font-semibold">{(parseFloat(formData.amount) * rate).toLocaleString('zh-TW', { maximumFractionDigits: 1 })}</span></span>
                        ) : (
                          <span>¥ <span className="text-amber-400 font-semibold">{(parseFloat(formData.amount) / rate).toLocaleString('zh-TW', { maximumFractionDigits: 1 })}</span></span>
                        )}
                      </p>
                    )}
                  </div>

                  {/* Submit Button */}
                  <button 
                    type="submit"
                    className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-brand-600/10 flex items-center justify-center space-x-2"
                  >
                    <i className="fa-solid fa-plus"></i>
                    <span>新增此筆消費</span>
                  </button>
                </form>
              </div>
            )}

            {/* TAB 2: LIST / RECORDS */}
            {activeTab === 'list' && (
              <div className="space-y-4">
                <div className="flex justify-between items-center">
                  <h3 className="text-sm font-bold text-slate-200">消費明細 ({records.length} 筆)</h3>
                  {records.length > 0 && (
                    <button 
                      onClick={() => {
                        if (confirm('確定要清除所有記帳資料嗎？')) {
                          saveRecords([]);
                          showNotification('已清除所有資料', 'info');
                        }
                      }}
                      className="text-xs text-rose-400 hover:text-rose-300 font-medium"
                    >
                      全部清除
                    </button>
                  )}
                </div>

                {records.length === 0 ? (
                  <div className="bg-slate-900 border border-slate-850 rounded-2xl p-8 text-center text-slate-500">
                    <i className="fa-solid fa-receipt text-3xl mb-3 block text-slate-600"></i>
                    <p className="text-sm">尚無消費紀錄</p>
                    <p className="text-xs mt-1">快去首頁新增一筆或使用相機辨識吧！</p>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {Object.keys(dailyRecords).map(date => {
                      // Calculate daily total
                      const dailyTotalJPY = dailyRecords[date].reduce((sum, r) => {
                        if (r.currency === 'JPY') return sum + r.amount;
                        return sum + (r.amount / rate);
                      }, 0);

                      return (
                        <div key={date} className="space-y-2">
                          <div className="flex justify-between items-center text-xs text-slate-400 font-medium px-1 bg-slate-900/40 py-1 rounded">
                            <span>{date}</span>
                            <span>日計: ¥{dailyTotalJPY.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</span>
                          </div>
                          
                          <div className="space-y-2">
                            {dailyRecords[date].map(r => {
                              const cat = categories.find(c => c.name === r.category) || categories[5];
                              return (
                                <div key={r.id} className="bg-slate-900 border border-slate-850 rounded-xl p-3 flex items-center justify-between hover:border-slate-800 transition-all">
                                  <div className="flex items-center space-x-3">
                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center border text-xs ${cat.color}`}>
                                      <i className={`fa-solid ${cat.icon}`}></i>
                                    </div>
                                    <div>
                                      <h4 className="text-sm font-bold text-slate-100">{r.item}</h4>
                                      <p className="text-[10px] text-slate-400 mt-0.5">{r.time.slice(11)}</p>
                                    </div>
                                  </div>

                                  <div className="flex items-center space-x-4">
                                    <div className="text-right">
                                      <p className="text-sm font-extrabold text-slate-100">
                                        {r.currency === 'JPY' ? '¥' : 'NT$'} {r.amount.toLocaleString()}
                                      </p>
                                      <p className="text-[10px] text-slate-400 mt-0.5">
                                        {r.currency === 'JPY' ? (
                                          <span>NT$ {(r.amount * rate).toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</span>
                                        ) : (
                                          <span>¥ {(r.amount / rate).toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</span>
                                        )}
                                      </p>
                                    </div>
                                    <button 
                                      onClick={() => handleDeleteRecord(r.id)}
                                      className="text-slate-500 hover:text-rose-400 p-1 transition-all"
                                    >
                                      <i className="fa-solid fa-trash-can text-xs"></i>
                                    </button>
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}

            {/* TAB 3: STATS / ANALYSIS */}
            {activeTab === 'stats' && (
              <div className="space-y-4">
                <h3 className="text-sm font-bold text-slate-200">消費統計分析</h3>

                {records.length === 0 ? (
                  <div className="bg-slate-900 border border-slate-850 rounded-2xl p-8 text-center text-slate-500">
                    <i className="fa-solid fa-chart-pie text-3xl mb-3 block text-slate-600"></i>
                    <p className="text-sm">尚無統計數據</p>
                  </div>
                ) : (
                  <div className="space-y-4">
                    {/* Progress bars for categories */}
                    <div className="bg-slate-900 border border-slate-850 rounded-2xl p-4 space-y-4">
                      <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider">各分類佔比</h4>
                      <div className="space-y-3">
                        {categories.map(cat => {
                          const data = categoryTotals[cat.name];
                          if (data.jpy === 0) return null;
                          return (
                            <div key={cat.name} className="space-y-1">
                              <div className="flex justify-between text-xs">
                                <span className="font-semibold text-slate-200 flex items-center">
                                  <i className={`fa-solid ${cat.icon} mr-1.5 opacity-70`}></i>
                                  {cat.name}
                                </span>
                                <span className="text-slate-400">
                                  ¥{data.jpy.toLocaleString('zh-TW', { maximumFractionDigits: 0 })} ({data.percentage.toFixed(1)}%)
                                </span>
                              </div>
                              <div className="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                                <div 
                                  className={`h-full rounded-full ${
                                    cat.name === '餐飲' ? 'bg-emerald-500' :
                                    cat.name === '交通' ? 'bg-blue-500' :
                                    cat.name === '購物' ? 'bg-pink-500' :
                                    cat.name === '住宿' ? 'bg-purple-500' :
                                    cat.name === '門票' ? 'bg-amber-500' :
                                    'bg-slate-500'
                                  }`}
                                  style={{ width: `${data.percentage}%` }}
                                ></div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {/* Quick Insights */}
                    <div className="grid grid-cols-2 gap-4">
                      <div className="bg-slate-900 border border-slate-850 p-3 rounded-2xl text-center">
                        <p className="text-[10px] text-slate-400">最高單筆金額</p>
                        <p className="text-lg font-bold text-white mt-1">
                          ¥ {Math.max(...records.map(r => r.currency === 'JPY' ? r.amount : r.amount/rate), 0).toLocaleString('zh-TW', { maximumFractionDigits: 0 })}
                        </p>
                      </div>
                      <div className="bg-slate-900 border border-slate-850 p-3 rounded-2xl text-center">
                        <p className="text-[10px] text-slate-400">平均消費/筆</p>
                        <p className="text-lg font-bold text-white mt-1">
                          ¥ {(totalInJPY / records.length || 0).toLocaleString('zh-TW', { maximumFractionDigits: 0 })}
                        </p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* TAB 4: SETTINGS */}
            {activeTab === 'settings' && (
              <div className="space-y-4">
                <h3 className="text-sm font-bold text-slate-200">應用程式設定</h3>

                {/* Exchange Rate Setting */}
                <div className="bg-slate-900 border border-slate-850 rounded-2xl p-4 space-y-3">
                  <h4 className="text-xs font-bold text-slate-300 flex items-center">
                    <i className="fa-solid fa-calculator mr-1.5 text-brand-400"></i>
                    自訂日幣換算台幣匯率
                  </h4>
                  <p className="text-[10px] text-slate-400">調整此匯率將會即時影響所有統計與明細轉換之結果。</p>
                  <div className="flex items-center space-x-3 mt-1">
                    <div className="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 flex items-center justify-between">
                      <span className="text-xs text-slate-400">1 JPY =</span>
                      <input 
                        type="number" 
                        step="0.0001"
                        value={rate}
                        onChange={(e) => {
                          const val = parseFloat(e.target.value) || 0;
                          setRate(val);
                          localStorage.setItem('travel_rate', val);
                        }}
                        className="bg-transparent text-right text-sm font-bold text-white focus:outline-none w-24"
                      />
                      <span className="text-xs text-slate-200 ml-1">TWD</span>
                    </div>
                  </div>
                </div>

                {/* Gemini API Key */}
                <div className="bg-slate-900 border border-slate-850 rounded-2xl p-4 space-y-3">
                  <h4 className="text-xs font-bold text-slate-300 flex items-center">
                    <i className="fa-solid fa-key mr-1.5 text-amber-400"></i>
                    自訂 Gemini API 金鑰 (選填)
                  </h4>
                  <p className="text-[10px] text-slate-400">系統會在有內置金鑰時優先使用內置金鑰。若需增強穩定性或離線狀態，可在此配置自訂金鑰。</p>
                  <input 
                    type="password" 
                    placeholder="AI_KEY..."
                    value={apiKey}
                    onChange={(e) => {
                      setApiKey(e.target.value);
                      localStorage.setItem('gemini_api_key', e.target.value);
                    }}
                    className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-sm text-slate-100 placeholder-slate-600 focus:outline-none focus:border-brand-500"
                  />
                </div>

                {/* PWA Info */}
                <div className="bg-slate-900 border border-slate-850 rounded-2xl p-4 space-y-2">
                  <h4 className="text-xs font-bold text-slate-300">PWA 離線安裝說明</h4>
                  <p className="text-[10px] text-slate-400 leading-relaxed">
                    在安卓 Chrome 瀏覽器中點擊上方「安裝 App」按鈕，或在蘋果 Safari 點選底部的「分享」按鈕，再選擇「加入主畫面」，即可完成原生 PWA 安裝。安裝後支援無網狀態下離線記帳。
                  </p>
                </div>
              </div>
            )}
          </main>

          {/* BOTTOM NAVIGATION BAR */}
          <nav className="fixed bottom-0 inset-x-0 bg-slate-900/90 backdrop-blur-md border-t border-slate-800 flex justify-around py-2 z-40 max-w-md mx-auto shadow-2xl">
            <button 
              onClick={() => setActiveTab('add')}
              className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl transition-all ${activeTab === 'add' ? 'text-brand-400' : 'text-slate-500 hover:text-slate-400'}`}
            >
              <i className="fa-solid fa-plus-minus text-lg"></i>
              <span className="text-[10px] font-medium">記帳</span>
            </button>

            <button 
              onClick={() => setActiveTab('list')}
              className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl transition-all ${activeTab === 'list' ? 'text-brand-400' : 'text-slate-500 hover:text-slate-400'}`}
            >
              <i className="fa-solid fa-receipt text-lg"></i>
              <span className="text-[10px] font-medium">明細</span>
            </button>

            <button 
              onClick={() => setActiveTab('stats')}
              className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl transition-all ${activeTab === 'stats' ? 'text-brand-400' : 'text-slate-500 hover:text-slate-400'}`}
            >
              <i className="fa-solid fa-chart-simple text-lg"></i>
              <span className="text-[10px] font-medium">統計</span>
            </button>

            <button 
              onClick={() => setActiveTab('settings')}
              className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl transition-all ${activeTab === 'settings' ? 'text-brand-400' : 'text-slate-500 hover:text-slate-400'}`}
            >
              <i className="fa-solid fa-sliders text-lg"></i>
              <span className="text-[10px] font-medium">設定</span>
            </button>
          </nav>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
