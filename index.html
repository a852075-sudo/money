<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>旅記 - 智慧旅遊記帳 PWA</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          }
        }
      }
    }
  </script>

  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

  <style>
    body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 4.5rem); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col overflow-x-hidden">

  <div id="root" class="w-full max-w-md mx-auto bg-slate-950 min-h-screen flex flex-col relative shadow-2xl"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 註冊 Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker 註冊成功', reg.scope))
          .catch(err => console.log('Service Worker 註冊失敗', err));
      });
    }

    function App() {
      const [activeTab, setActiveTab] = useState('add');
      const [records, setRecords] = useState([]);
      const [rate, setRate] = useState(0.215); // 預設 1 日幣 = 0.215 台幣
      const [apiKey, setApiKey] = useState('');
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isInstalled, setIsInstalled] = useState(false);

      // 相機與辨識狀態
      const [showCamera, setShowCamera] = useState(false);
      const [cameraLoading, setCameraLoading] = useState(false);
      const [scanStatus, setScanStatus] = useState('');
      const videoRef = useRef(null);
      const canvasRef = useRef(null);

      // 表單狀態
      const [formData, setFormData] = useState({ time: '', item: '', amount: '', currency: 'JPY', category: '餐飲' });
      const [notification, setNotification] = useState(null);

      const categories = [
        { name: '餐飲', icon: 'fa-utensils', color: 'bg-emerald-500/20 text-emerald-400' },
        { name: '交通', icon: 'fa-train', color: 'bg-blue-500/20 text-blue-400' },
        { name: '購物', icon: 'fa-bag-shopping', color: 'bg-pink-500/20 text-pink-400' },
        { name: '住宿', icon: 'fa-hotel', color: 'bg-purple-500/20 text-purple-400' },
        { name: '其他', icon: 'fa-ellipsis-h', color: 'bg-slate-500/20 text-slate-400' }
      ];

      useEffect(() => {
        if (localStorage.getItem('travel_records')) setRecords(JSON.parse(localStorage.getItem('travel_records')));
        if (localStorage.getItem('travel_rate')) setRate(parseFloat(localStorage.getItem('travel_rate')));
        if (localStorage.getItem('gemini_api_key')) setApiKey(localStorage.getItem('gemini_api_key'));
        
        resetFormTime();

        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
        });

        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
          setIsInstalled(true);
        }
      }, []);

      const resetFormTime = () => {
        const now = new Date();
        const offset = now.getTimezoneOffset();
        const localNow = new Date(now.getTime() - (offset * 60 * 1000));
        setFormData(prev => ({ ...prev, time: localNow.toISOString().slice(0, 16) }));
      };

      const showNotification = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const handleInstallClick = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          setDeferredPrompt(null);
          setIsInstalled(true);
        }
      };

      const handleAddRecord = (e) => {
        if (e) e.preventDefault();
        if (!formData.item || !formData.amount) {
          showNotification('請填寫完整項目名稱與金額！', 'warning');
          return;
        }

        const newRecord = {
          id: Date.now().toString(),
          time: formData.time,
          item: formData.item,
          amount: parseFloat(formData.amount),
          currency: formData.currency,
          category: formData.category
        };

        const updated = [newRecord, ...records];
        setRecords(updated);
        localStorage.setItem('travel_records', JSON.stringify(updated));
        showNotification('成功新增一筆消費！', 'success');

        setFormData({ time: '', item: '', amount: '', currency: 'JPY', category: '餐飲' });
        resetFormTime();
      };

      // 相機與 Gemini 2.5 Flash 辨識
      const startCamera = async () => {
        setShowCamera(true);
        setCameraLoading(true);
        setScanStatus('正在啟動相機...');
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false
          });
          if (videoRef.current) {
            videoRef.current.srcObject = stream;
            videoRef.current.onloadedmetadata = () => {
              videoRef.current.play();
              setCameraLoading(false);
              setScanStatus('相機就緒，請對準發票或物品');
            };
          }
        } catch (err) {
          showNotification("無法存取相機，請檢查權限", "error");
          setShowCamera(false);
        }
      };

      const stopCamera = () => {
        if (videoRef.current && videoRef.current.srcObject) {
          videoRef.current.srcObject.getTracks().forEach(track => track.stop());
        }
        setShowCamera(false);
      };

      const captureAndRecognize = async () => {
        if (!videoRef.current || !canvasRef.current) return;
        setCameraLoading(true);
        setScanStatus('正在拍攝並解析照片...');

        const video = videoRef.current;
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        stopCamera();
        setCameraLoading(true);
        setScanStatus('AI 正在強力辨識發票中...');

        try {
          const prompt = `你是一個專業的旅遊記帳助手。請分析這張照片並回傳一個合法的 JSON 對象（不要包含 markdown 標籤）：
          {
            "time": "YYYY-MM-DD HH:mm (若無年份請用2026)",
            "item": "商品或品項中文名稱",
            "amount": 金額數字,
            "currency": "JPY" 或 "TWD",
            "category": "餐飲", "交通", "購物", "住宿", "其他" 之一
          }`;

          const targetKey = apiKey || "";
          const apiURL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${targetKey}`;

          const res = await fetch(apiURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: base64Image } }] }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          if (!res.ok) throw new Error('API 回傳錯誤');
          const result = await res.json();
          const cleanJson = result.candidates?.[0]?.content?.parts?.[0]?.text.replace(/```json/g, '').replace(/```/g, '').trim();
          const aiData = JSON.parse(cleanJson);

          setFormData({
            time: aiData.time || formData.time,
            item: aiData.item || '掃描品項',
            amount: aiData.amount ? aiData.amount.toString() : '',
            currency: aiData.currency === 'TWD' ? 'TWD' : 'JPY',
            category: aiData.category || '其他'
          });
          showNotification('AI 辨識填入成功！', 'success');
        } catch (err) {
          showNotification('辨識失敗，請至設定確認您的 API Key 是否正確。', 'error');
        } finally {
          setCameraLoading(false);
          setScanStatus('');
        }
      };

      // 計算總金額（全換算為日幣，再換算台幣）
      const totalInJPY = records.reduce((sum, r) => r.currency === 'JPY' ? sum + r.amount : sum + (r.amount / rate), 0);
      const totalInTWD = totalInJPY * rate;

      return (
        <div className="flex flex-col min-h-screen pb-safe">
          {/* Header */}
          <header className="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-30 flex items-center justify-between">
            <div className="flex items-center space-x-2">
              <i className="fa-solid fa-plane text-brand-500 text-xl"></i>
              <h1 className="text-lg font-bold">旅記 PWA</h1>
            </div>
            {deferredPrompt && !isInstalled && (
              <button onClick={handleInstallClick} className="bg-amber-500 text-slate-950 font-bold text-xs px-3 py-1.5 rounded-lg animate-bounce">
                安裝 App
              </button>
            )}
          </header>

          {/* Toast 通知 */}
          {notification && (
            <div className="fixed top-16 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-xl text-sm bg-slate-800 border border-slate-700">
              {notification.message}
            </div>
          )}

          {/* 總計看板 */}
          <div className="p-4">
            <div className="bg-gradient-to-br from-indigo-950 to-slate-900 border border-brand-500/20 rounded-2xl p-4 shadow-xl">
              <p className="text-xs text-indigo-300">旅遊消費總累計</p>
              <p className="text-3xl font-extrabold mt-1 text-white">
                <span className="text-sm text-amber-400 mr-1">¥</span>
                {totalInJPY.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}
              </p>
              <p className="text-sm text-slate-400 mt-1">
                約等同 <span className="text-emerald-400 font-bold">NT$ {totalInTWD.toLocaleString('zh-TW', { maximumFractionDigits: 0 })}</span>
              </p>
            </div>
          </div>

          {/* 相機畫面疊加層 */}
          {showCamera && (
            <div className="fixed inset-0 bg-black z-50 flex flex-col justify-between p-4">
              <div className="flex justify-between items-center">
                <h3 className="text-sm font-bold text-white">AI 發票/物品辨識</h3>
                <button onClick={stopCamera} class="text-slate-400 text-xl"><i className="fa-solid fa-xmark"></i></button>
              </div>
              <div className="relative w-full aspect-[3/4] bg-slate-900 rounded-xl overflow-hidden">
                <video ref={videoRef} playsInline className="w-full h-full object-cover"></video>
                <canvas ref={canvasRef} className="hidden"></canvas>
                {cameraLoading && (
                  <div className="absolute inset-0 bg-slate-950/80 flex flex-col items-center justify-center p-4">
                    <p className="text-sm text-center text-slate-200">{scanStatus}</p>
                  </div>
                )}
              </div>
              <div className="flex flex-col items-center pb-6">
                <button onClick={captureAndRecognize} disabled={cameraLoading} className="w-16 h-16 bg-white rounded-full flex items-center justify-center">
                  <div className="w-12 h-12 bg-brand-600 rounded-full flex items-center justify-center text-white"><i className="fa-solid fa-camera"></i></div>
                </button>
              </div>
            </div>
          )}

          {/* 主要內文 */}
          <main className="flex-grow px-4 overflow-y-auto">
            {activeTab === 'add' && (
              <div className="space-y-4">
                <button onClick={startCamera} className="w-full bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center justify-between text-left">
                  <div>
                    <h3 className="text-sm font-bold">使用 AI 相機智慧記帳</h3>
                    <p className="text-xs text-slate-400 mt-1">拍照即可自動辨識品項與日幣金額</p>
                  </div>
                  <i className="fa-solid fa-wand-magic-sparkles text-amber-400 text-lg"></i>
                </button>

                <form onSubmit={handleAddRecord} className="bg-slate-900 p-4 rounded-xl space-y-4 border border-slate-800">
                  <div>
                    <label className="text-xs text-slate-400 block mb-1">消費時間</label>
                    <input type="datetime-local" value={formData.time} onChange={e => setFormData({...formData, time: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-sm text-white focus:outline-none" />
                  </div>
                  <div>
                    <label className="text-xs text-slate-400 block mb-1">物品/項目名稱</label>
                    <input type="text" placeholder="例如：拉麵、藥妝" value={formData.item} onChange={e => setFormData({...formData, item: e.target.value})} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-sm text-white focus:outline-none" />
                  </div>
                  <div>
                    <label className="text-xs text-slate-400 block mb-1">消費金額</label>
                    <div className="flex rounded-lg overflow-hidden border border-slate-800 bg-slate-950">
                      <select value={formData.currency} onChange={e => setFormData({...formData, currency: e.target.value})} className="bg-transparent px-2 text-sm text-slate-300 focus:outline-none">
                        <option value="JPY">日幣 ¥</option>
                        <option value="TWD">台幣 NT$</option>
                      </select>
                      <input type="number" inputMode="decimal" placeholder="請輸入金額" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="w-full bg-transparent p-2 text-sm text-white focus:outline-none" />
                    </div>
                  </div>
                  <button type="submit" className="w-full bg-brand-600 py-2.5 rounded-lg text-sm font-bold">確認新增</button>
                </form>
              </div>
            )}

            {activeTab === 'list' && (
              <div className="space-y-2">
                {records.length === 0 ? <p className="text-center text-xs text-slate-500 py-8">尚無記帳紀錄</p> : 
                  records.map(r => (
                    <div key={r.id} className="bg-slate-900 p-3 rounded-xl flex justify-between items-center border border-slate-850">
                      <div>
                        <h4 className="text-sm font-bold">{r.item}</h4>
                        <p className="text-[10px] text-slate-400 mt-1">{r.time}</p>
                      </div>
                      <div className="text-right">
                        <p className="text-sm font-bold">{r.currency === 'JPY' ? '¥' : 'NT$'} {r.amount}</p>
                        <p className="text-[10px] text-slate-400">
                          {r.currency === 'JPY' ? `NT$ ${(r.amount * rate).toFixed(0)}` : `¥ ${(r.amount / rate).toFixed(0)}`}
                        </p>
                      </div>
                    </div>
                  ))
                }
              </div>
            )}

            {activeTab === 'settings' && (
              <div className="space-y-4">
                <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-2">
                  <h4 className="text-xs font-bold text-slate-300">匯率設定 (1 日幣換算多少台幣)</h4>
                  <input type="number" step="0.0001" value={rate} onChange={e => { setRate(parseFloat(e.target.value)); localStorage.setItem('travel_rate', e.target.value); }} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-sm text-white" />
                </div>
                <div className="bg-slate-900 p-4 rounded-xl border border-slate-800 space-y-2">
                  <h4 className="text-xs font-bold text-slate-300">Gemini API 金鑰</h4>
                  <input type="password" placeholder="請貼上您的 Gemini API 金鑰" value={apiKey} onChange={e => { setApiKey(e.target.value); localStorage.setItem('gemini_api_key', e.target.value); }} className="w-full bg-slate-950 border border-slate-800 rounded-lg p-2 text-sm text-white" />
                </div>
              </div>
            )}
          </main>

          {/* 底部導覽 */}
          <nav className="fixed bottom-0 inset-x-0 bg-slate-900 border-t border-slate-800 flex justify-around py-2 max-w-md mx-auto">
            <button onClick={() => setActiveTab('add')} className={`flex flex-col items-center ${activeTab === 'add' ? 'text-brand-500' : 'text-slate-500'}`}><i className="fa-solid fa-pen text-lg"></i><span className="text-[10px]">記帳</span></button>
            <button onClick={() => setActiveTab('list')} className={`flex flex-col items-center ${activeTab === 'list' ? 'text-brand-500' : 'text-slate-500'}`}><i className="fa-solid fa-list text-lg"></i><span className="text-[10px]">明細</span></button>
            <button onClick={() => setActiveTab('settings')} className={`flex flex-col items-center ${activeTab === 'settings' ? 'text-brand-500' : 'text-slate-500'}`}><i className="fa-solid fa-gear text-lg"></i><span className="text-[10px]">設定</span></button>
          </nav>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
